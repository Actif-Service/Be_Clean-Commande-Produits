<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commande de produits - BE Clean</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js" defer></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
  emailjs.init("UIMYUuF1YijZh1DFI");
});
</script>

</head>
<body>

<!-- Logo -->
<div class="logo">
<img src="images/logo-actif-service.png" alt="Logo Actif Service">
</div>

<h1>Commande de produits</h1>

<form id="formCommande">

<div class="ligne-formulaire">

  <div class="form-group">
    <label>Société</label>
    <input type="text" value="BE Clean" readonly>
  </div>

  <div class="form-group">
    <label>Chantier</label>
    <select id="chantier" required>
      <option value="">-- Sélectionner --</option>
    </select>
  </div>

  <div class="form-group">
    <label>Votre nom</label>
    <input type="text" id="nom" required>
  </div>

</div>

<div id="produits"></div>

<div class="form-group">
<label>Autre demande</label>
<textarea id="autre"></textarea>
</div>

<button type="submit">Envoyer la commande</button>

<script src="app.js"></script>

</form>
</body>
</html>
