<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --blue:#185FA5;--blue-light:#E6F1FB;--blue-mid:#378ADD;
    --green:#3B6D11;--green-light:#EAF3DE;
    --gray:#5F5E5A;--gray-light:#F1EFE8;--gray-border:#D3D1C7;
    --red:#A32D2D;--red-light:#FCEBEB;
    --amber:#BA7517;--amber-light:#FAEEDA;
    --teal:#0F6E56;--teal-light:#E1F5EE;
    --text:#2C2C2A;--text-muted:#5F5E5A;
    --bg:#ffffff;--bg-page:#F8F7F4;--radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg-page);color:var(--text);min-height:100vh;}
  .nav{background:var(--bg);border-bottom:1px solid var(--gray-border);padding:0 1.5rem;display:flex;align-items:center;gap:.75rem;height:56px;position:sticky;top:0;z-index:100;}
  .nav-logo{font-size:15px;font-weight:600;color:var(--blue);flex-shrink:0;}
  .nav-sep{flex:1;}
  .nav-tab{padding:6px 13px;border-radius:6px;border:none;background:transparent;font-size:13px;font-weight:500;color:var(--text-muted);cursor:pointer;transition:all .15s;white-space:nowrap;}
  .nav-tab.active{background:var(--blue-light);color:var(--blue);}
  .nav-tab:hover:not(.active){background:var(--gray-light);}
  .view{display:none;padding:2rem 1.5rem;max-width:960px;margin:0 auto;}
  .view.active{display:block;}
  .card{background:var(--bg);border-radius:var(--radius);border:1px solid var(--gray-border);padding:1.25rem;margin-bottom:1rem;}
  label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:6px;}
  input[type="text"],select,textarea{width:100%;padding:9px 12px;border:1px solid var(--gray-border);border-radius:7px;font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s;}
  input[type="text"]:focus,select:focus,textarea:focus{border-color:var(--blue-mid);box-shadow:0 0 0 3px rgba(55,138,221,.12);}
  input[readonly]{background:var(--gray-light);color:var(--gray);}
  textarea{resize:vertical;min-height:80px;}
  .form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:1rem;margin-bottom:1rem;}
  .btn{padding:10px 20px;border-radius:7px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .15s;}
  .btn-primary{background:var(--blue);color:#fff;}
  .btn-primary:hover{background:var(--blue-mid);}
  .btn-success{background:var(--green);color:#fff;}
  .btn-success:hover{background:#27500A;}
  .btn-secondary{background:var(--gray-light);color:var(--text);border:1px solid var(--gray-border);}
  .btn-secondary:hover{background:var(--gray-border);}
  .btn-danger{background:var(--red-light);color:var(--red);border:1px solid rgba(163,45,45,.2);}
  .btn-sm{padding:6px 12px;font-size:12px;}
  .produits-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:10px;margin:1.25rem 0;}
  .produit-card{background:var(--bg);border:1px solid var(--gray-border);border-radius:8px;overflow:hidden;text-align:center;transition:border-color .15s;}
  .produit-card:hover{border-color:var(--blue-mid);}
  .produit-card img{width:100%;height:88px;object-fit:cover;display:block;background:var(--gray-light);}
  .produit-nom{font-size:11px;font-weight:500;padding:6px 6px 4px;color:var(--text);line-height:1.3;}
  .qty-row{display:flex;align-items:center;justify-content:center;gap:4px;padding:4px 6px 8px;}
  .qty-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--gray-border);background:var(--gray-light);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:600;color:var(--text);transition:all .1s;}
  .qty-btn:hover{background:var(--blue-light);border-color:var(--blue-mid);color:var(--blue);}
  .qty-input{width:38px;text-align:center;border:1px solid var(--gray-border);border-radius:5px;font-size:13px;font-weight:600;padding:3px 0;color:var(--text);}
  .qty-input:focus{border-color:var(--blue-mid);outline:none;}
  .badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;}
  .badge-blue{background:var(--blue-light);color:var(--blue);}
  .badge-green{background:var(--green-light);color:var(--green);}
  .badge-amber{background:var(--amber-light);color:var(--amber);}
  .alert{padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:1rem;}
  .alert-info{background:var(--blue-light);color:var(--blue);border:1px solid rgba(24,95,165,.2);}
  .toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:500;z-index:9999;opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none;max-width:340px;}
  .toast.show{opacity:1;transform:translateY(0);}
  .toast.error{background:var(--red);}
  .breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);margin-bottom:1.25rem;}
  .breadcrumb a{color:var(--blue);cursor:pointer;}
  .breadcrumb a:hover{text-decoration:underline;}
  .section-title{font-size:20px;font-weight:600;margin-bottom:.3rem;}
  .section-sub{font-size:13px;color:var(--text-muted);margin-bottom:1.5rem;}
  .client-list{display:flex;flex-direction:column;gap:8px;}
  .client-item{background:var(--bg);border:1px solid var(--gray-border);border-radius:8px;padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;}
  .client-item:hover{border-color:var(--blue-mid);background:var(--blue-light);}
  .client-name{font-size:14px;font-weight:600;}
  .client-meta{font-size:12px;color:var(--text-muted);}
  .produit-check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:8px;}
  .produit-check-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--gray-border);border-radius:7px;cursor:pointer;transition:all .15s;background:var(--bg);}
  .produit-check-item:hover{border-color:var(--blue-mid);}
  .produit-check-item.checked{border-color:var(--green);background:var(--green-light);}
  .produit-check-item input[type="checkbox"]{accent-color:var(--green);width:16px;height:16px;cursor:pointer;flex-shrink:0;}
  .check-label{font-size:12px;font-weight:500;line-height:1.3;cursor:pointer;}
  .produit-check-item.checked .check-label{color:var(--green);}
  .link-box{background:var(--blue-light);border:1px solid rgba(24,95,165,.2);border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:10px;}
  .link-url{font-size:12px;font-weight:500;color:var(--blue);flex:1;word-break:break-all;}
  .toolbar{display:flex;gap:8px;align-items:center;margin-bottom:1rem;flex-wrap:wrap;}
  .spacer{flex:1;}

  /* SUIVI */
  .stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;}
  .stat-card{background:var(--bg);border:1px solid var(--gray-border);border-radius:8px;padding:14px 16px;text-align:center;}
  .stat-num{font-size:28px;font-weight:700;}
  .stat-label{font-size:11px;color:var(--text-muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
  .filter-row{display:flex;gap:8px;margin-bottom:1.25rem;flex-wrap:wrap;}
  .filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--gray-border);background:var(--bg);font-size:12px;font-weight:600;cursor:pointer;color:var(--text-muted);transition:all .15s;}
  .filter-btn.active{background:var(--blue);color:#fff;border-color:var(--blue);}
  .commande-row{background:var(--bg);border:1px solid var(--gray-border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;transition:border-color .15s;}
  .commande-row.livree{border-color:#9FE1CB;background:#f6fdf9;}
  .commande-row.partielle{border-color:#FAC775;background:#fffdf6;}
  .commande-header{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;}
  .commande-header:hover{background:rgba(0,0,0,.02);}
  .commande-info{flex:1;min-width:0;}
  .commande-title{font-size:14px;font-weight:600;}
  .commande-meta{font-size:12px;color:var(--text-muted);margin-top:2px;}
  .commande-detail{display:none;padding:0 16px 16px;border-top:1px solid var(--gray-border);}
  .commande-detail.open{display:block;}
  .suivi-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px;}
  .suivi-table th{background:var(--gray-light);padding:8px 10px;text-align:left;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;}
  .suivi-table td{padding:8px 10px;border-top:1px solid var(--gray-border);vertical-align:middle;}
  .check-livraison{display:flex;align-items:center;gap:6px;cursor:pointer;}
  .check-livraison input[type="checkbox"]{width:18px;height:18px;accent-color:var(--green);cursor:pointer;}
  .check-livraison.done{color:var(--green);font-weight:500;}
  .check-livraison.done .prod-name{text-decoration:line-through;opacity:.6;}
  .qty-badge{display:inline-block;background:var(--blue-light);color:var(--blue);font-weight:700;font-size:13px;padding:2px 10px;border-radius:20px;min-width:32px;text-align:center;}
  .status-pill{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;}
  .status-attente{background:var(--amber-light);color:var(--amber);}
  .status-partielle{background:var(--blue-light);color:var(--blue);}
  .status-livree{background:var(--green-light);color:var(--green);}
  .email-notice{background:var(--teal-light);border:1px solid rgba(15,110,86,.2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--teal);margin-bottom:1.25rem;}

  @media(max-width:600px){
    .nav{padding:0 .75rem;gap:.5rem;}
    .nav-logo{font-size:13px;}
    .nav-tab{padding:5px 9px;font-size:12px;}
    .view{padding:1.25rem 1rem;}
    .form-row{grid-template-columns:1fr;}
    .produits-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));}
    .stats-bar{gap:6px;}
    .stat-num{font-size:22px;}
  }
</style>
</head>

/* STORAGE */
function getCommandes(){try{return JSON.parse(localStorage.getItem('commandes')||'[]');}catch(e){return[];}}
function saveCommandes(l){try{localStorage.setItem('commandes',JSON.stringify(l));}catch(e){}}
function getChantierProduits(k,n){try{const r=localStorage.getItem('p_'+k+'_'+encodeURIComponent(n));return r?JSON.parse(r):null;}catch(e){return null;}}
function setChantierProduits(k,n,v){try{localStorage.setItem('p_'+k+'_'+encodeURIComponent(n),JSON.stringify(v));}catch(e){}}
function rmChantierProduits(k,n){localStorage.removeItem('p_'+k+'_'+encodeURIComponent(n));}

function esc(s){if(!s)return"";return s.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);}
function toast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(err?' error':'');setTimeout(()=>{t.className='toast';},3500);}

/* NAV */
function showView(n){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('view-'+n).classList.add('active');
  document.getElementById('tab-'+n).classList.add('active');
  if(n==='commande')renderCommande();
  if(n==='suivi')renderSuivi();
  if(n==='admin')renderAdminList();
}

      </div>
    </div>
    <div id="hint" class="alert alert-info">Sélectionnez un chantier pour voir les produits disponibles.</div>
    <div id="psec" style="display:none;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div style="font-size:15px;font-weight:600;">Produits disponibles</div>
        <span id="pcnt" class="badge badge-blue"></span>
      </div>
      <div class="produits-grid" id="pgrid"></div>
    </div>
    <div class="card" id="ocard" style="display:none;">
      <label>Autre demande (optionnel)</label>
      <textarea id="autre" placeholder="Décrivez votre autre besoin..."></textarea>
    </div>
    <div id="sarea" style="display:none;margin-top:1rem;">
      <button class="btn btn-success" style="width:100%;font-size:15px;padding:14px;" onclick="submitCmd()">✓ Envoyer la commande</button>
    </div>`;
}

function onCC(){
  const v=document.getElementById('chantier').value;
  const show=el=>document.getElementById(el).style.display='block';
  const hide=el=>document.getElementById(el).style.display='none';
  if(!v){hide('psec');show('hint');hide('ocard');hide('sarea');return;}
  hide('hint');show('psec');show('ocard');show('sarea');
  const allowed=getChantierProduits(CC.key,v);
  const prods=allowed?ALL_PRODUCTS.filter(p=>allowed.includes(p.nom)):ALL_PRODUCTS;
  document.getElementById('pcnt').textContent=prods.length+' produit'+(prods.length>1?'s':'');
  document.getElementById('pgrid').innerHTML=prods.map(p=>`
    <div class="produit-card">
      <img src="${p.image}" alt="${esc(p.nom)}" loading="lazy">
      <div class="produit-nom">${esc(p.nom)}</div>
      <div class="qty-row">
        <button class="qty-btn" onclick="dq('${encodeURIComponent(p.nom)}',-1)">−</button>
        <input type="number" class="qty-input" id="q_${encodeURIComponent(p.nom)}" value="0" min="0" data-nom="${esc(p.nom)}">
        <button class="qty-btn" onclick="dq('${encodeURIComponent(p.nom)}',1)">+</button>
      </div>
    </div>`).join('');
}

function dq(e,d){const i=document.getElementById('q_'+e);if(i)i.value=Math.max(0,(parseInt(i.value)||0)+d);}

function submitCmd(){
  const chantier=document.getElementById('chantier').value;
  const nom=document.getElementById('nom').value.trim();
  const autre=document.getElementById('autre').value.trim();
  if(!chantier){toast('Sélectionnez un chantier',true);return;}
  if(!nom){toast('Indiquez votre nom',true);return;}
  const lignes=[];
  document.querySelectorAll('.qty-input').forEach(i=>{const q=parseInt(i.value)||0;if(q>0)lignes.push({nom:i.dataset.nom,qty:q,livre:false});});
  if(lignes.length===0&&!autre){toast('Aucun produit sélectionné',true);return;}

  const now=new Date();
  const date=now.toLocaleDateString('fr-BE');
  const heure=now.toLocaleTimeString('fr-BE',{hour:'2-digit',minute:'2-digit'});
  const chD=CC.chantiers.find(c=>c.nom===chantier);

  const html=`<div style="font-family:Arial,sans-serif;font-size:14px;color:#000;">
<table style="width:100%;border-collapse:collapse;margin-bottom:20px;"><tr>
<td style="width:33%;text-align:left;padding:8px 0;"><b>Société :</b> ${esc(CC.societe)}<br><b>Demandeur :</b> ${esc(nom)}</td>
<td style="width:33%;text-align:center;border:4px solid #a5d6a7;background:#f0fff0;border-radius:8px;padding:12px;">
  <div style="font-size:18px;font-weight:bold;">${esc(chantier)}</div>
  ${chD&&chD.adresse?`<div style="font-size:12px;color:#666;margin-top:4px;">${esc(chD.adresse)}</div>`:''}
</td>
<td style="width:33%;text-align:right;padding:8px 0;">${date}<br>${heure}</td>
</tr></table>
<table style="width:100%;border-collapse:collapse;font-size:14px;">
<thead><tr style="background:#1976d2;color:white;">
<th style="border:1px solid #ccc;padding:10px;text-align:left;">Produit</th>
<th style="border:1px solid #ccc;padding:10px;text-align:center;width:80px;">Qté</th>
</tr></thead><tbody>
${lignes.map((l,i)=>`<tr style="background:${i%2===0?'#fff':'#cde6ff'};"><td style="border:1px solid #ccc;padding:10px;">${esc(l.nom)}</td><td style="border:1px solid #ccc;padding:10px;text-align:center;font-weight:bold;">${l.qty}</td></tr>`).join('')}
</tbody></table>
${autre?`<p style="margin-top:16px;"><b>Autre demande :</b><br>${esc(autre)}</p>`:''}
</div>`;

  const btn=document.querySelector('#sarea button');
  btn.disabled=true;btn.textContent='Envoi en cours...';

  Promise.allSettled(
    DESTINATAIRES.map(to=>emailjs.send("service_kt6gmbs","template_53rynh4",{
      societe:CC.societe,chantier,nom,commande:html,to_email:to
    }))
  ).then(results=>{
    if(results.some(r=>r.status==='fulfilled')){
      const cmds=getCommandes();
      cmds.unshift({
        id:Date.now().toString(),date:now.toISOString(),
        societe:CC.societe,clientKey:CC.key,
        chantier,adresse:chD?chD.adresse:'',
        demandeur:nom,autre:autre||'',
        lignes,statut:'attente'
      });
      saveCommandes(cmds);
      toast('✓ Commande envoyée à '+DESTINATAIRES.join(' et '));
      document.getElementById('nom').value='';
      document.getElementById('autre').value='';
      document.getElementById('chantier').value='';
      onCC();
    }else{toast('Erreur envoi email. Réessayez.',true);}
    btn.disabled=false;btn.textContent='✓ Envoyer la commande';
  });
}

/* ═══ SUIVI ═══ */
let SF='tous';
function renderSuivi(){
  const cmds=getCommandes();
  const el=document.getElementById('suivi-content');
  const tot=cmds.length,liv=cmds.filter(c=>c.statut==='livree').length,
        par=cmds.filter(c=>c.statut==='partielle').length,att=cmds.filter(c=>c.statut==='attente').length;
  const filt=SF==='tous'?cmds:cmds.filter(c=>c.statut===SF);

  el.innerHTML=`
    <div class="section-title">Suivi des livraisons</div>
    <div class="section-sub">${tot} commande${tot!==1?'s':''} au total</div>
    <div class="stats-bar">
      <div class="stat-card"><div class="stat-num" style="color:var(--amber);">${att}</div><div class="stat-label">En attente</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--blue);">${par}</div><div class="stat-label">En cours</div></div>
      <div class="stat-card"><div class="stat-num" style="color:var(--green);">${liv}</div><div class="stat-label">Livrées</div></div>
    </div>
    <div class="filter-row">
      ${['tous','attente','partielle','livree'].map((f,i)=>{
        const lbl=['Toutes','En attente','En cours','Livrées'][i];
        const cnt=[tot,att,par,liv][i];
        return`<button class="filter-btn${SF===f?' active':''}" onclick="setSF('${f}')">${lbl} (${cnt})</button>`;
      }).join('')}
      <span class="spacer"></span>
      ${liv>0?`<button class="btn btn-danger btn-sm" onclick="clearLiv()">Supprimer livrées</button>`:''}
    </div>
    ${filt.length===0
      ?`<div style="text-align:center;padding:3rem;color:var(--text-muted);font-size:14px;">Aucune commande dans cette catégorie.</div>`
      :filt.map(c=>cmdRow(c)).join('')}`;
}

function cmdRow(c){
  const d=new Date(c.date);
  const ds=d.toLocaleDateString('fr-BE')+' '+d.toLocaleTimeString('fr-BE',{hour:'2-digit',minute:'2-digit'});
  const nl=c.lignes.length,ll=c.lignes.filter(l=>l.livre).length;
  let sc='status-attente',sl='En attente',rc='';
  if(c.statut==='livree'){sc='status-livree';sl='Livré ✓';rc=' livree';}
  else if(c.statut==='partielle'){sc='status-partielle';sl=ll+'/'+nl+' livrés';rc=' partielle';}
  return`<div class="commande-row${rc}" id="row_${c.id}">
  <div class="commande-header" onclick="togDet('${c.id}')">
    <div class="commande-info">
      <div class="commande-title">${esc(c.societe)} · ${esc(c.chantier)}</div>
      <div class="commande-meta">${esc(c.demandeur)} · ${ds}</div>
    </div>
    <span class="status-pill ${sc}" id="pill_${c.id}">${sl}</span>
    <span style="color:var(--text-muted);margin-left:8px;font-size:18px;">›</span>
  </div>
  <div class="commande-detail" id="det_${c.id}">
    <table class="suivi-table">
      <thead><tr>
        <th style="width:50%;">Produit</th>
        <th style="width:70px;text-align:center;">Qté</th>
        <th>Livraison</th>
      </tr></thead>
      <tbody>
        ${c.lignes.map((l,i)=>`<tr>
          <td>${esc(l.nom)}</td>
          <td style="text-align:center;"><span class="qty-badge">${l.qty}</span></td>
          <td><label class="check-livraison${l.livre?' done':''}" id="cl_${c.id}_${i}">
            <input type="checkbox"${l.livre?' checked':''} onchange="togLiv('${c.id}',${i},this.checked)">
            <span class="prod-name">${l.livre?'Livré':'À livrer'}</span>
          </label></td>
        </tr>`).join('')}
        ${c.autre?`<tr><td colspan="3" style="color:var(--text-muted);font-style:italic;font-size:12px;">📝 ${esc(c.autre)}</td></tr>`:''}
      </tbody>
    </table>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;">
      ${c.statut!=='livree'?`<button class="btn btn-success btn-sm" id="tallbtn_${c.id}" onclick="markAll('${c.id}')">✓ Tout marquer livré</button>`:''}
      <button class="btn btn-danger btn-sm" onclick="delCmd('${c.id}')">Supprimer</button>
    </div>
  </div>
</div>`;
}

function togDet(id){document.getElementById('det_'+id).classList.toggle('open');}

function togLiv(id,idx,v){
  const cmds=getCommandes();const c=cmds.find(x=>x.id===id);if(!c)return;
  c.lignes[idx].livre=v;
  const lbl=document.getElementById('cl_'+id+'_'+idx);
  if(lbl){lbl.className='check-livraison'+(v?' done':'');lbl.querySelector('.prod-name').textContent=v?'Livré':'À livrer';}
  const ll=c.lignes.filter(l=>l.livre).length;
  c.statut=ll===0?'attente':ll===c.lignes.length?'livree':'partielle';
  saveCommandes(cmds);
  const row=document.getElementById('row_'+id);
  if(row){
    row.className='commande-row'+(c.statut==='livree'?' livree':c.statut==='partielle'?' partielle':'');
    const pill=document.getElementById('pill_'+id);
    if(pill){
      let sc='status-attente',sl='En attente';
      if(c.statut==='livree'){sc='status-livree';sl='Livré ✓';}
      else if(c.statut==='partielle'){sc='status-partielle';sl=ll+'/'+c.lignes.length+' livrés';}
      pill.className='status-pill '+sc;pill.textContent=sl;
    }
  }
  updStats();
}

function markAll(id){
  const cmds=getCommandes();const c=cmds.find(x=>x.id===id);if(!c)return;
  c.lignes.forEach((l,i)=>{
    l.livre=true;
    const lbl=document.getElementById('cl_'+id+'_'+i);
    if(lbl){lbl.className='check-livraison done';lbl.querySelector('.prod-name').textContent='Livré';lbl.querySelector('input').checked=true;}
  });
  c.statut='livree';saveCommandes(cmds);
  const row=document.getElementById('row_'+id);
  if(row){
    row.className='commande-row livree';
    const pill=document.getElementById('pill_'+id);
    if(pill){pill.className='status-pill status-livree';pill.textContent='Livré ✓';}
    const ab=document.getElementById('tallbtn_'+id);if(ab)ab.remove();
  }
  toast('✓ Commande marquée comme livrée');updStats();
}

function delCmd(id){if(!confirm('Supprimer cette commande ?'))return;saveCommandes(getCommandes().filter(c=>c.id!==id));renderSuivi();}
function clearLiv(){if(!confirm('Supprimer toutes les commandes livrées ?'))return;saveCommandes(getCommandes().filter(c=>c.statut!=='livree'));renderSuivi();}
function setSF(f){SF=f;renderSuivi();}
function updStats(){
  const cmds=getCommandes();
  const nums=document.querySelectorAll('.stat-num');
  if(nums[0])nums[0].textContent=cmds.filter(c=>c.statut==='attente').length;
  if(nums[1])nums[1].textContent=cmds.filter(c=>c.statut==='partielle').length;
  if(nums[2])nums[2].textContent=cmds.filter(c=>c.statut==='livree').length;
}

/* ═══ ADMIN ═══ */
let AC=null,ACH=null;
function renderAdminList(){
  const el=document.getElementById('admin-content');
  el.innerHTML=`
    <div class="section-title">Administration</div>
    <div class="section-sub">Configurez les produits autorisés par chantier</div>
    <div class="email-notice">
      ✉ Chaque commande est envoyée automatiquement à <strong>${DESTINATAIRES.join('</strong> et <strong>')}</strong>
    </div>
    <div class="client-list">
      ${BASE_CLIENTS.map(c=>{
        const cfg=c.chantiers.filter(ch=>getChantierProduits(c.key,ch.nom)!==null).length;
        return`<div class="client-item" onclick="selAC('${c.key}')">
          <div style="flex:1;">
            <div class="client-name">${esc(c.societe)}</div>
            <div class="client-meta">${c.chantiers.length} chantier${c.chantiers.length>1?'s':''}${cfg>0?` · <span style="color:var(--green);">${cfg} configuré${cfg>1?'s':''}</span>`:''}
            </div>
          </div>
          <span style="color:var(--text-muted);font-size:18px;">›</span>
        </div>`;
      }).join('')}
    </div>`;
}

function selAC(k){AC=BASE_CLIENTS.find(c=>c.key===k);renderAC();}
function renderAC(){
  const el=document.getElementById('admin-content');
  el.innerHTML=`
    <div class="breadcrumb"><a onclick="renderAdminList()">Admin</a> › ${esc(AC.societe)}</div>
    <div class="section-title">${esc(AC.societe)}</div>
    <div class="section-sub">Cliquez sur un chantier pour configurer ses produits</div>
    <div class="card" style="margin-bottom:1.5rem;">
      <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px;">LIEN DE COMMANDE</div>
      <div class="link-box">
        <span class="link-url">${location.origin}${location.pathname}?client=${AC.key}</span>
        <button class="btn btn-secondary btn-sm" onclick="cpLink('${AC.key}')">Copier</button>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;">
      ${AC.chantiers.map(ch=>{
        const pr=getChantierProduits(AC.key,ch.nom);
        const cnt=pr?pr.length:ALL_PRODUCTS.length;
        return`<div class="card" style="cursor:pointer;margin-bottom:0;transition:border-color .15s;"
          onclick="selACH('${encodeURIComponent(ch.nom)}')"
          onmouseover="this.style.borderColor='var(--blue-mid)'"
          onmouseout="this.style.borderColor='var(--gray-border)'">
          <div style="font-size:14px;font-weight:600;margin-bottom:6px;">${esc(ch.nom)}</div>
          ${ch.adresse?`<div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;">${esc(ch.adresse)}</div>`:''}
          ${pr!==null?`<span class="badge badge-green">${cnt} produit${cnt>1?'s':''}</span>`:`<span class="badge badge-amber">Tous (${cnt})</span>`}
          <div style="font-size:11px;color:var(--blue);margin-top:8px;font-weight:500;">Configurer →</div>
        </div>`;
      }).join('')}
    </div>`;
}

function selACH(e){ACH=decodeURIComponent(e);renderACH();}
function renderACH(){
  const chD=AC.chantiers.find(c=>c.nom===ACH);
  const cur=getChantierProduits(AC.key,ACH);
  window._sel=new Set(cur||ALL_PRODUCTS.map(p=>p.nom));
  const el=document.getElementById('admin-content');
  el.innerHTML=`
    <div class="breadcrumb"><a onclick="renderAdminList()">Admin</a> › <a onclick="renderAC()">${esc(AC.societe)}</a> › ${esc(ACH)}</div>
    <div class="section-title">${esc(ACH)}</div>
    <div class="section-sub">${chD&&chD.adresse?esc(chD.adresse)+' · ':''}Cochez les produits autorisés</div>
    <div class="toolbar">
      <button class="btn btn-secondary btn-sm" onclick="selAll(true)">Tout sélectionner</button>
      <button class="btn btn-secondary btn-sm" onclick="selAll(false)">Tout désélectionner</button>
      <span class="spacer"></span>
      <span id="scnt" class="badge badge-blue" style="font-size:13px;padding:4px 10px;">${window._sel.size} / ${ALL_PRODUCTS.length} sélectionnés</span>
    </div>
    <div class="produit-check-grid">
      ${ALL_PRODUCTS.map(p=>{
        const e=encodeURIComponent(p.nom),ch=window._sel.has(p.nom);
        return`<div class="produit-check-item${ch?' checked':''}" id="pci_${e}" onclick="togP('${e}')">
          <input type="checkbox"${ch?' checked':''} id="chk_${e}" onclick="event.stopPropagation();togP('${e}')">
          <label class="check-label" for="chk_${e}" onclick="event.preventDefault()">${esc(p.nom)}</label>
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:10px;margin-top:1.5rem;flex-wrap:wrap;">
      <button class="btn btn-primary" onclick="saveACH()">Enregistrer</button>
      <button class="btn btn-secondary" onclick="renderAC()">Annuler</button>
      ${cur!==null?`<button class="btn btn-danger btn-sm" style="margin-left:auto;" onclick="resetACH()">Réinitialiser (tous)</button>`:''}
    </div>`;
}

function togP(e){
  const n=decodeURIComponent(e),item=document.getElementById('pci_'+e),chk=document.getElementById('chk_'+e);
  if(window._sel.has(n)){window._sel.delete(n);item.classList.remove('checked');chk.checked=false;}
  else{window._sel.add(n);item.classList.add('checked');chk.checked=true;}
  document.getElementById('scnt').textContent=window._sel.size+' / '+ALL_PRODUCTS.length+' sélectionnés';
}
function selAll(v){
  ALL_PRODUCTS.forEach(p=>{
    const e=encodeURIComponent(p.nom),item=document.getElementById('pci_'+e),chk=document.getElementById('chk_'+e);
    if(v){window._sel.add(p.nom);item.classList.add('checked');chk.checked=true;}
    else{window._sel.delete(p.nom);item.classList.remove('checked');chk.checked=false;}
  });
  document.getElementById('scnt').textContent=window._sel.size+' / '+ALL_PRODUCTS.length+' sélectionnés';
}
function saveACH(){
  setChantierProduits(AC.key,ACH,ALL_PRODUCTS.filter(p=>window._sel.has(p.nom)).map(p=>p.nom));
  toast('✓ Configuration enregistrée');setTimeout(()=>renderAC(),600);
}
function resetACH(){rmChantierProduits(AC.key,ACH);toast('Réinitialisé — tous les produits');setTimeout(()=>renderAC(),600);}
function cpLink(k){
  const u=location.origin+location.pathname+'?client='+k;
  navigator.clipboard.writeText(u).then(()=>toast('Lien copié !')).catch(()=>toast('Copiez manuellement le lien',true));
}

/* INIT */
const _p=new URLSearchParams(location.search);
if(_p.get('client'))showView('commande');
else renderAdminList();
</script>
</body>
</html>
