<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Commande de produits</title>
  <link rel="stylesheet" href="style.css">

  <style>
    /* 🔹 Optimisation mobile bouton */
    #envoyerCommande {
      width: 100%;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      background-color: #1976d2;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 8px;
      margin-top: 20px;
    }

    #envoyerCommande:active {
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      #envoyerCommande {
        position: fixed;
        bottom: 0;
        left: 0;
        border-radius: 0;
        z-index: 1000;
      }

      body {
        padding-bottom: 90px;
      }
    }
  </style>
</head>

<body>

  <!-- Logo -->
  <div class="logo-container">
    <img src="images/logo.jpg" alt="Logo Actif Service" class="logo">
  </div>

  <h1>Commande de produits</h1>

  <!-- FORMULAIRE COMPLET -->
  <form id="formCommande">

    <div class="form-group">
      <label for="societe">Nom de la société :</label>
      <input type="text" id="societe" name="societe" placeholder="Votre société" required>
    </div>

    <div class="form-group">
      <label for="chantier">Chantier :</label>
      <input type="text" id="chantier" name="chantier" placeholder="Nom du chantier" required>
    </div>

    <div class="form-group">
      <label for="nom">Votre nom :</label>
      <input type="text" id="nom" name="nom" placeholder="Votre nom" required>
    </div>

    <!-- Produits générés par app.js -->
    <div id="produits"></div>

    <!-- Champ caché -->
    <input type="hidden" name="commande" id="commandeHidden">

    <button type="submit" id="envoyerCommande">
      Envoyer la commande
    </button>

  </form>

  <!-- EMAILJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js" defer></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      emailjs.init("UIMYUuF1YijZh1DFI");
    });
  </script>

  <!-- APP -->
  <script src="app.js" defer></script>

</body>

</html>
